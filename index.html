<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Prince Chakusa — Property Operations & Guest Experience</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
/* ── RESET ── */
*{margin:0;padding:0;box-sizing:border-box}
a,a:visited,a:link{color:inherit;text-decoration:none}
img{display:block}

/* ── TOKENS ── */
:root{
  --teal:      #0d7a65;
  --teal-mid:  #11a688;
  --teal-lite: #e4f4f1;
  --coral:     #d95f3b;
  --coral-lite:#fceee9;
  --navy:      #0e1f3d;
  --ink:       #1a2035;
  --ink2:      #3d4460;
  --muted:     #7b84a3;
  --border:    #dde1ee;
  --bg-page:   #f0f2f8;
  --bg-card:   #ffffff;
  --white:     #ffffff;
  --shadow-sm: 0 2px 8px rgba(14,31,61,.07);
  --shadow-md: 0 6px 24px rgba(14,31,61,.10);
  --shadow-lg: 0 14px 48px rgba(14,31,61,.14);
}

/* ── BODY / LAYOUT ── */
body{
  font-family:'Outfit',sans-serif;
  background:var(--bg-page);
  color:var(--ink);
  min-height:100vh;
}

/* ── SIDEBAR NAV ── */
.sidebar{
  position:fixed;top:0;left:0;bottom:0;
  width:240px;
  background:var(--navy);
  display:flex;flex-direction:column;
  z-index:200;
  box-shadow:4px 0 24px rgba(14,31,61,.18);
}
.sidebar-logo{
  padding:2rem 1.8rem 1.5rem;
  border-bottom:1px solid rgba(255,255,255,.08);
}
.logo-name{
  font-family:'Playfair Display',serif;
  font-size:1.15rem;font-weight:700;
  color:#fff;line-height:1.2;
}
.logo-title{
  font-size:0.68rem;font-weight:500;
  letter-spacing:.12em;text-transform:uppercase;
  color:var(--teal-mid);margin-top:.4rem;
}
.nav-items{
  flex:1;padding:1.5rem 0;overflow-y:auto;
}
.nav-item{
  display:flex;align-items:center;gap:.85rem;
  padding:.75rem 1.8rem;
  font-size:.82rem;font-weight:500;
  letter-spacing:.04em;
  color:rgba(255,255,255,.5);
  cursor:pointer;
  transition:all .2s;
  border-left:3px solid transparent;
  position:relative;
}
.nav-item:hover{
  color:#fff;
  background:rgba(255,255,255,.05);
}
.nav-item.active{
  color:#fff;
  background:rgba(13,122,101,.2);
  border-left-color:var(--teal-mid);
}
.nav-icon{font-size:1rem;width:20px;text-align:center;}
.nav-sidebar-footer{
  padding:1.5rem 1.8rem;
  border-top:1px solid rgba(255,255,255,.08);
}
.avail-pill{
  display:flex;align-items:center;gap:.6rem;
  padding:.55rem 1rem;
  background:rgba(13,122,101,.25);
  border:1px solid rgba(17,166,136,.3);
  border-radius:100px;
  font-size:.7rem;font-weight:600;
  letter-spacing:.06em;
  color:var(--teal-mid);
}
.pulse{
  width:7px;height:7px;border-radius:50%;
  background:#2ecc71;
  animation:pulse 2s infinite;
}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(46,204,113,.5)}50%{opacity:.7;box-shadow:0 0 0 5px rgba(46,204,113,0)}}

/* ── TOPBAR (mobile) ── */
.topbar{
  display:none;
  position:fixed;top:0;left:0;right:0;height:60px;
  background:var(--navy);
  align-items:center;justify-content:space-between;
  padding:0 1.2rem;
  z-index:300;
  box-shadow:0 2px 12px rgba(14,31,61,.2);
}
.topbar-logo{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;color:#fff;}
.hamburger{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;gap:5px;}
.hamburger span{width:22px;height:2px;background:#fff;border-radius:2px;display:block;transition:.3s;}

/* mobile drawer */
.drawer{
  display:none;position:fixed;inset:0;
  background:var(--navy);z-index:250;
  flex-direction:column;padding:5rem 2rem 2rem;
  gap:1rem;
}
.drawer.open{display:flex}
.drawer-close{position:absolute;top:1rem;right:1.5rem;background:none;border:none;color:#fff;font-size:1.5rem;cursor:pointer;}
.drawer a{font-size:1.2rem;font-weight:500;color:rgba(255,255,255,.7);padding:.5rem 0;border-bottom:1px solid rgba(255,255,255,.08);}
.drawer a:hover{color:#fff}

/* ── MAIN CONTENT ── */
.main{
  margin-left:240px;
  min-height:100vh;
}

/* ── PAGES ── */
.page{display:none;min-height:100vh;padding:3rem 3.5rem 4rem;}
.page.active{display:block}

/* ── PAGE HEADER STRIP ── */
.page-header{
  display:flex;align-items:center;gap:1rem;
  margin-bottom:2.5rem;
  padding-bottom:1.5rem;
  border-bottom:2px solid var(--border);
}
.page-header-icon{
  width:48px;height:48px;border-radius:12px;
  background:var(--teal);
  display:flex;align-items:center;justify-content:center;
  font-size:1.4rem;
  box-shadow:0 4px 12px rgba(13,122,101,.3);
}
.page-header-text h1{
  font-family:'Playfair Display',serif;
  font-size:1.8rem;font-weight:700;
  color:var(--ink);line-height:1;
}
.page-header-text p{
  font-size:.82rem;color:var(--muted);
  margin-top:.25rem;letter-spacing:.04em;
}

/* ── CARDS ── */
.card{
  background:var(--bg-card);
  border:1.5px solid var(--border);
  border-radius:16px;
  box-shadow:var(--shadow-sm);
  overflow:hidden;
}
.card:hover{box-shadow:var(--shadow-md);}
.card-head{
  padding:1.4rem 1.8rem;
  background:var(--bg-page);
  border-bottom:1.5px solid var(--border);
  display:flex;align-items:center;gap:.8rem;
}
.card-head-icon{
  width:34px;height:34px;border-radius:8px;
  background:var(--teal-lite);
  display:flex;align-items:center;justify-content:center;
  font-size:1rem;
}
.card-head-title{font-size:.9rem;font-weight:700;color:var(--ink);}
.card-head-sub{font-size:.75rem;color:var(--muted);margin-top:.1rem;}
.card-body{padding:1.8rem;}

/* ── SECTION LABELS ── */
.sec-label{
  display:inline-flex;align-items:center;gap:.5rem;
  font-size:.7rem;font-weight:700;
  letter-spacing:.16em;text-transform:uppercase;
  color:var(--teal);margin-bottom:.7rem;
}
.sec-label::before{content:'';width:18px;height:2.5px;background:var(--teal);border-radius:2px;}

/* ── BADGE ── */
.badge{
  display:inline-block;
  padding:.25rem .75rem;
  border-radius:100px;
  font-size:.7rem;font-weight:700;
  letter-spacing:.06em;text-transform:uppercase;
}
.badge-teal{background:var(--teal-lite);color:var(--teal);}
.badge-coral{background:var(--coral-lite);color:var(--coral);}
.badge-navy{background:rgba(14,31,61,.08);color:var(--navy);}
.badge-green{background:rgba(46,204,113,.12);color:#1a9952;}

/* ══════════════════════════════════
   HOME PAGE
══════════════════════════════════ */
#home.page{padding:0;display:none;}
#home.page.active{display:flex;flex-direction:column;}

.home-hero{
  background:var(--navy);
  padding:4rem 3.5rem 3.5rem;
  position:relative;overflow:hidden;
}
.home-hero::before{
  content:'';position:absolute;
  top:-120px;right:-120px;
  width:400px;height:400px;border-radius:50%;
  background:radial-gradient(circle,rgba(13,122,101,.25) 0%,transparent 70%);
}
.home-hero::after{
  content:'';position:absolute;
  bottom:-80px;left:20%;
  width:300px;height:300px;border-radius:50%;
  background:radial-gradient(circle,rgba(217,95,59,.12) 0%,transparent 70%);
}
.home-hero-inner{
  display:grid;grid-template-columns:1fr auto;
  gap:3rem;align-items:center;
  position:relative;z-index:2;
  max-width:1100px;
}
.hero-eyebrow{
  display:inline-flex;align-items:center;gap:.6rem;
  padding:.4rem .9rem;
  background:rgba(13,122,101,.2);
  border:1px solid rgba(17,166,136,.3);
  border-radius:100px;
  font-size:.7rem;font-weight:700;
  letter-spacing:.1em;color:var(--teal-mid);
  margin-bottom:1.4rem;
}
.hero-name{
  font-family:'Playfair Display',serif;
  font-size:clamp(2.6rem,4vw,4.2rem);
  font-weight:900;line-height:.95;
  color:#fff;margin-bottom:.6rem;
}
.hero-name .accent{color:var(--teal-mid);}
.hero-role{
  font-size:.82rem;font-weight:600;
  letter-spacing:.14em;text-transform:uppercase;
  color:rgba(255,255,255,.45);
  margin-bottom:1.4rem;
}
.hero-desc{
  font-size:1rem;line-height:1.8;
  color:rgba(255,255,255,.65);
  max-width:520px;margin-bottom:2.2rem;
}
.hero-btns{display:flex;flex-wrap:wrap;gap:.8rem;}
.btn-primary{
  padding:.8rem 1.8rem;
  background:var(--teal);color:#fff;
  font-size:.78rem;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;
  border-radius:8px;border:none;cursor:pointer;
  transition:all .2s;display:inline-block;
}
.btn-primary:hover{background:var(--teal-mid);transform:translateY(-2px);box-shadow:0 6px 18px rgba(13,122,101,.4);}
.btn-ghost{
  padding:.8rem 1.8rem;
  border:2px solid rgba(255,255,255,.2);
  color:rgba(255,255,255,.75);
  font-size:.78rem;font-weight:600;
  letter-spacing:.08em;text-transform:uppercase;
  border-radius:8px;cursor:pointer;
  transition:all .2s;display:inline-block;
  background:none;
}
.btn-ghost:hover{border-color:var(--teal-mid);color:#fff;}

.hero-photo-wrap{position:relative;}
.hero-photo{
  width:220px;height:280px;
  object-fit:cover;object-position:center top;
  border-radius:16px;
  border:3px solid rgba(255,255,255,.12);
  box-shadow:var(--shadow-lg);
}
.hero-photo-badge{
  position:absolute;bottom:-1rem;left:-1rem;
  background:var(--coral);
  color:#fff;border-radius:10px;
  padding:.6rem .9rem;
  font-size:.7rem;font-weight:700;
  letter-spacing:.06em;text-transform:uppercase;
  box-shadow:0 4px 14px rgba(217,95,59,.4);
}

/* Stats strip */
.home-stats{
  display:grid;grid-template-columns:repeat(4,1fr);
  background:var(--bg-card);
  border-bottom:3px solid var(--border);
}
.hstat{
  padding:1.6rem 1.4rem;
  border-right:1.5px solid var(--border);
  text-align:center;
}
.hstat:last-child{border-right:none;}
.hstat-num{
  font-family:'Playfair Display',serif;
  font-size:2.2rem;font-weight:700;
  color:var(--teal);line-height:1;
  display:block;
}
.hstat-lbl{
  font-size:.68rem;font-weight:600;
  letter-spacing:.1em;text-transform:uppercase;
  color:var(--muted);margin-top:.3rem;
}

/* Quick nav cards */
.home-nav-grid{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:1.5rem;
  padding:3rem 3.5rem;
}
.home-nav-card{
  background:var(--bg-card);
  border:1.5px solid var(--border);
  border-radius:16px;
  padding:1.8rem;
  cursor:pointer;
  transition:all .25s;
  display:flex;flex-direction:column;gap:.8rem;
  box-shadow:var(--shadow-sm);
}
.home-nav-card:hover{
  border-color:var(--teal);
  box-shadow:var(--shadow-md);
  transform:translateY(-3px);
}
.hnc-icon{
  width:48px;height:48px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.4rem;
}
.hnc-title{font-size:1rem;font-weight:700;color:var(--ink);}
.hnc-desc{font-size:.82rem;color:var(--muted);line-height:1.6;}
.hnc-arrow{
  font-size:.8rem;font-weight:700;
  color:var(--teal);letter-spacing:.06em;
  text-transform:uppercase;
  margin-top:auto;
}

/* ══════════════════════════════════
   ABOUT PAGE
══════════════════════════════════ */
.about-grid{display:grid;grid-template-columns:280px 1fr;gap:2rem;align-items:start;}
.about-photo-card{
  background:var(--bg-card);border:1.5px solid var(--border);
  border-radius:16px;overflow:hidden;
  box-shadow:var(--shadow-sm);
}
.about-photo-img{
  width:100%;aspect-ratio:3/4;
  object-fit:cover;object-position:center top;
}
.about-photo-info{padding:1.4rem;}
.about-info-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:.55rem 0;
  border-bottom:1px solid var(--border);
  font-size:.82rem;
}
.about-info-row:last-child{border-bottom:none;}
.info-label{color:var(--muted);font-weight:500;}
.info-val{color:var(--ink);font-weight:600;text-align:right;}

.about-content{display:flex;flex-direction:column;gap:1.5rem;}
.bio-text{font-size:1rem;line-height:1.85;color:var(--ink2);}
.bio-text strong{color:var(--teal);font-weight:700;}

.skill-chips{display:flex;flex-wrap:wrap;gap:.5rem;}
.chip{
  padding:.35rem .9rem;
  background:var(--bg-page);
  border:1.5px solid var(--border);
  border-radius:100px;
  font-size:.76rem;font-weight:500;
  color:var(--ink2);
  transition:all .2s;cursor:default;
}
.chip:hover{border-color:var(--teal);color:var(--teal);background:var(--teal-lite);}

/* ══════════════════════════════════
   SKILLS PAGE
══════════════════════════════════ */
.skills-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1.5rem;}

/* ══════════════════════════════════
   EXPERIENCE PAGE
══════════════════════════════════ */
.exp-timeline{display:flex;flex-direction:column;gap:1.5rem;}
.exp-card-outer{
  background:var(--bg-card);
  border:1.5px solid var(--border);
  border-radius:16px;
  overflow:hidden;
  box-shadow:var(--shadow-sm);
  transition:box-shadow .2s;
}
.exp-card-outer:hover{box-shadow:var(--shadow-md);}
.exp-card-header{
  display:grid;grid-template-columns:auto 1fr auto;
  gap:1.2rem;align-items:center;
  padding:1.4rem 1.8rem;
  background:var(--bg-page);
  border-bottom:1.5px solid var(--border);
}
.exp-company-logo{
  width:48px;height:48px;border-radius:12px;
  background:var(--navy);
  display:flex;align-items:center;justify-content:center;
  font-family:'Playfair Display',serif;
  font-size:1.1rem;font-weight:700;color:#fff;
  flex-shrink:0;
}
.exp-header-meta{}
.exp-company{font-size:1rem;font-weight:700;color:var(--ink);}
.exp-location{font-size:.76rem;color:var(--muted);margin-top:.15rem;}
.exp-date-badge{
  padding:.4rem .9rem;
  background:var(--bg-card);
  border:1.5px solid var(--border);
  border-radius:8px;
  font-size:.72rem;font-weight:700;
  color:var(--ink2);white-space:nowrap;
  text-align:center;
}
.exp-card-body{padding:1.8rem;}
.exp-role-title{
  font-family:'Playfair Display',serif;
  font-size:1.25rem;font-weight:700;font-style:italic;
  color:var(--teal);margin-bottom:1rem;
}
.exp-bullets{list-style:none;display:flex;flex-direction:column;gap:.5rem;}
.exp-bullets li{
  display:flex;gap:.75rem;align-items:flex-start;
  font-size:.88rem;color:var(--ink2);line-height:1.65;
}
.bullet-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--teal);margin-top:.45rem;flex-shrink:0;
}
.exp-note-txt{font-size:.82rem;color:var(--coral);font-style:italic;font-weight:500;}

/* ══════════════════════════════════
   WORK PAGE
══════════════════════════════════ */
.works-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;}
.work-featured{grid-column:1/-1;}
.work-inner{
  display:grid;grid-template-columns:1fr 1fr;
  gap:2rem;align-items:start;
}
.work-num-badge{
  width:40px;height:40px;border-radius:10px;
  background:var(--teal-lite);
  display:flex;align-items:center;justify-content:center;
  font-family:'Playfair Display',serif;
  font-size:1.1rem;font-weight:700;color:var(--teal);
  margin-bottom:1rem;
}
.work-title{
  font-family:'Playfair Display',serif;
  font-size:1.3rem;font-weight:700;
  color:var(--ink);margin-bottom:.6rem;line-height:1.2;
}
.work-desc{font-size:.86rem;color:var(--muted);line-height:1.75;margin-bottom:1rem;}
.work-feats{list-style:none;display:flex;flex-direction:column;gap:.4rem;margin-bottom:1.2rem;}
.work-feats li{
  display:flex;gap:.6rem;align-items:flex-start;
  font-size:.84rem;color:var(--ink2);line-height:1.5;
}
.feat-check{color:var(--teal);font-weight:700;font-size:.8rem;margin-top:.1rem;}
.stack-row{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:1.2rem;}
.stack-tag{
  padding:.2rem .65rem;
  background:var(--bg-page);
  border:1px solid var(--border);
  border-radius:6px;
  font-size:.7rem;font-weight:500;color:var(--muted);
}
.work-link-btn{
  display:inline-flex;align-items:center;gap:.4rem;
  font-size:.76rem;font-weight:700;
  letter-spacing:.06em;text-transform:uppercase;
  color:var(--teal);
  transition:gap .2s;
}
.work-link-btn:hover{gap:.7rem;}
.work-link-btn.na{color:var(--coral);pointer-events:none;}
.dash-frame{
  border:2px solid var(--border);
  border-radius:12px;overflow:hidden;
  box-shadow:var(--shadow-md);
}
.dash-bar{
  background:var(--bg-page);padding:.55rem .9rem;
  display:flex;align-items:center;gap:.4rem;
  border-bottom:1.5px solid var(--border);
}
.dash-dot{width:10px;height:10px;border-radius:50%;}
.dash-lbl{font-size:.65rem;color:var(--muted);margin-left:.5rem;letter-spacing:.06em;}

/* ══════════════════════════════════
   CONTACT PAGE
══════════════════════════════════ */
.contact-layout{
  display:grid;grid-template-columns:1fr 1fr;
  gap:2rem;align-items:start;
}
.contact-card{
  background:var(--bg-card);
  border:1.5px solid var(--border);
  border-radius:16px;
  box-shadow:var(--shadow-sm);
  overflow:hidden;
}
.cc-header{
  padding:1.8rem;
  background:var(--navy);
  position:relative;overflow:hidden;
}
.cc-header::before{
  content:'';position:absolute;
  top:-60px;right:-60px;width:200px;height:200px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(13,122,101,.3) 0%,transparent 70%);
}
.cc-header h2{
  font-family:'Playfair Display',serif;
  font-size:1.5rem;font-weight:700;
  color:#fff;line-height:1.2;
  position:relative;z-index:1;
}
.cc-header h2 em{font-style:italic;color:var(--teal-mid);}
.cc-header p{
  font-size:.85rem;color:rgba(255,255,255,.55);
  line-height:1.7;margin-top:.6rem;
  position:relative;z-index:1;
}
.cc-links{padding:1.5rem;display:flex;flex-direction:column;gap:1rem;}
.cc-link{
  display:flex;align-items:center;gap:1rem;
  padding:1rem 1.2rem;
  background:var(--bg-page);
  border:1.5px solid var(--border);
  border-radius:12px;
  transition:all .2s;
}
.cc-link:hover{border-color:var(--teal);background:var(--teal-lite);}
.cc-icon{font-size:1.4rem;flex-shrink:0;}
.cc-label{font-size:.65rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);}
.cc-val{font-size:.9rem;font-weight:600;color:var(--ink);}

.cv-download-card{
  background:var(--bg-card);
  border:1.5px solid var(--border);
  border-radius:16px;
  padding:2rem;
  box-shadow:var(--shadow-sm);
}
.cv-download-card h3{
  font-family:'Playfair Display',serif;
  font-size:1.4rem;font-weight:700;
  color:var(--ink);margin-bottom:.5rem;
}
.cv-download-card p{font-size:.88rem;color:var(--muted);line-height:1.7;margin-bottom:1.5rem;}

.avail-card{
  background:linear-gradient(135deg,var(--teal) 0%,#0d9e84 100%);
  border-radius:16px;padding:2rem;
  box-shadow:0 8px 28px rgba(13,122,101,.3);
  margin-top:1.5rem;
}
.avail-card h3{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;color:#fff;margin-bottom:.5rem;}
.avail-card p{font-size:.85rem;color:rgba(255,255,255,.75);line-height:1.7;}

/* ── RESPONSIVE ── */
@media(max-width:1024px){
  .sidebar{display:none;}
  .topbar{display:flex;}
  .main{margin-left:0;}
  .page{padding:1.5rem;}
  #home.page .home-nav-grid,
